<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Skocz i skacz</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  color:white;
  overflow:hidden;
  display:none;

  /* 🌈 animowane tło */
  background:linear-gradient(-45deg,#0a0a12,#1e1e2f,#050510,#0d0d1a);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 🌌 STARS */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(2px 2px at 20px 30px, white, transparent),
    radial-gradient(1px 1px at 120px 220px, white, transparent),
    radial-gradient(1px 1px at 300px 400px, white, transparent),
    radial-gradient(2px 2px at 500px 100px, white, transparent);
  background-size:600px 600px;
  animation:stars 80s linear infinite;
  opacity:0.35;
  pointer-events:none;
}

@keyframes stars{
  from{transform:translateY(0);}
  to{transform:translateY(-600px);}
}

/* UI */
h1{
  text-align:center;
  font-size:65px;
  margin-top:20px;
  text-shadow:0 0 20px rgba(255,255,255,0.3);
}

#count{
  text-align:center;
  font-size:45px;
  text-shadow:0 0 10px rgba(0,255,150,0.4);
}

/* GAME */
.scene{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
}

.ground{
  width:460px;
  height:14px;
  background:#888;
  border-radius:12px;
  box-shadow:0 0 20px rgba(255,255,255,0.1);
  position:relative;
}

/* ✨ KULKA NEON */
.ball{
  width:85px;
  height:85px;
  border-radius:50%;
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  background:gray;

  box-shadow:
    0 0 20px rgba(255,255,255,0.2),
    0 0 40px rgba(0,255,150,0.15);
}

/* SHOP */
.shop{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.55);
  padding:15px;
  border-radius:14px;
}

.shop button{
  display:block;
  margin:8px 0;
  padding:12px;
  width:180px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.active{
  background:linear-gradient(135deg,#ff6600,#ff8800);
  color:white;
}

.locked{
  background:gray;
  opacity:0.4;
}

/* RANK */
#rank{
  position:absolute;
  left:20px;
  top:20px;
  background:rgba(0,0,0,0.45);
  padding:12px;
  border-radius:12px;
  width:210px;
}

/* FLOAT */
.float-number{
  position:absolute;
  font-size:22px;
  font-weight:bold;
  color:#00ff88;
  pointer-events:none;
  animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
  0%{opacity:1;}
  100%{opacity:0; transform:translateY(-80px);}
}

/* PARTICLES */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  pointer-events:none;
  animation:fly 0.5s linear forwards;
}

@keyframes fly{
  0%{opacity:1;}
  100%{opacity:0; transform:translate(var(--x), var(--y));}
}

/* 🔥 TRAIL */
.trail{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:rgba(0,255,150,0.4);
  filter:blur(2px);
  pointer-events:none;
  animation:trailFade 0.4s linear forwards;
}

@keyframes trailFade{
  0%{opacity:1;}
  100%{opacity:0; transform:scale(0.3);}
}

</style>
</head>

<body>

<div id="profile">👤
<div id="menu">
<button onclick="logout()">Wyloguj</button>
</div>
</div>

<h1>Skocz i skacz</h1>
<div id="count">0</div>

<div class="scene">
  <div class="ground">
    <div class="ball" id="ball"></div>
  </div>
</div>

<div class="shop">
  <button id="b2" onclick="buy2()">x2 (100)</button>
  <button id="bAuto" onclick="buyAuto()">Auto (300)</button>
  <button id="b3" onclick="buy3()">x3 (600)</button>
  <button id="bTurbo" onclick="buyTurbo()">Turbo (1000)</button>
  <button onclick="rebirth()">REBIRTH (10000)</button>
</div>

<div id="rank">
  <h3>TOP 10</h3>
  <ul id="list"></ul>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, updateDoc,
  collection, query, orderBy, limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  document.body.style.display="block";

  userRef=doc(db,"users",user.uid);

  const snap=await getDoc(userRef);

  if(snap.exists()){
    const d=snap.data();

    count=d.count||0;
    mult=d.mult||1;
    auto=d.auto||false;
    turbo=d.turbo||false;
    rebirths=d.rebirths||0;
    step=d.step||0;
  }

  updateUI();
  updateBall();
  updateShop();
  loadRank();

  if(auto) startAuto();
  if(turbo) startTurbo();
});

/* GAME */
let count=0;
let mult=1;
let auto=false;
let turbo=false;
let rebirths=0;
let step=0;

let jumping=false;
let userRef;

const ball=document.getElementById("ball");
const countEl=document.getElementById("count");

/* 🚀 SKOK */
function jump(){
  if(jumping) return;

  jumping=true;

  count += mult + rebirths;
  updateUI();
  save();

  let y=14;
  let up=true;

  const anim=setInterval(()=>{

    if(up){
      y+=8;
      if(y>=140) up=false;
    }else{
      y-=8;
      if(y<=14){
        y=14;
        clearInterval(anim);
        jumping=false;
      }
    }

    ball.style.bottom=y+"px";

    spawnTrail();

  },16);

  spawnFloat(mult + rebirths);
  spawnParticles();
}

document.body.onclick=jump;

/* TRAIL */
function spawnTrail(){
  const t=document.createElement("div");
  t.className="trail";

  const rect=ball.getBoundingClientRect();

  t.style.left=rect.left+rect.width/2+"px";
  t.style.top=rect.top+rect.height/2+"px";

  document.body.appendChild(t);

  setTimeout(()=>t.remove(),400);
}

/* FLOAT */
function spawnFloat(value){
  const el=document.createElement("div");
  el.className="float-number";
  el.textContent=`+${value}`;

  const rect=ball.getBoundingClientRect();

  el.style.left=rect.left+rect.width/2+"px";
  el.style.top=rect.top+"px";

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

/* PARTICLES */
function spawnParticles(){
  const rect=ball.getBoundingClientRect();

  for(let i=0;i<10;i++){
    const p=document.createElement("div");
    p.className="particle";

    const x=(Math.random()-0.5)*200;
    const y=(Math.random()-0.5)*200;

    p.style.left=rect.left+rect.width/2+"px";
    p.style.top=rect.top+rect.height/2+"px";

    p.style.setProperty("--x",x+"px");
    p.style.setProperty("--y",y+"px");

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),500);
  }
}

/* UI */
function updateUI(){
  countEl.textContent=count;
}

/* BALL */
function updateBall(){
  ball.style.background =
    rebirths===0?"gray":
    rebirths===1?"#4da3ff":
    rebirths===2?"#00ff88":
    rebirths===3?"#ffcc00":
    rebirths===4?"#ff4d4d":"gold";
}

/* SHOP */
function updateShop(){
  const buttons=[
    {id:"b2",step:0},
    {id:"bAuto",step:1},
    {id:"b3",step:2},
    {id:"bTurbo",step:3}
  ];

  buttons.forEach(b=>{
    const el=document.getElementById(b.id);

    if(step===b.step){
      el.className="active";
      el.disabled=false;
    }else{
      el.className="locked";
      el.disabled=true;
    }
  });
}

/* AUTO / TURBO */
function startAuto(){
  setInterval(()=>{ if(!jumping) jump(); },1500);
}

function startTurbo(){
  setInterval(()=>{ if(!jumping) jump(); },700);
}
</script>

</body>
</html>
